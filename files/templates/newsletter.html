<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>趨勢探針 (The Probe) - Weekly Analysis</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f4; }
        .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; border-bottom: 3px solid #e74c3c; padding-bottom: 15px; }
        h3 { color: #c0392b; margin-top: 30px; }
        .summary-box { background: #ecf0f1; border-left: 5px solid #3498db; padding: 20px; margin: 20px 0; font-size: 1.1em; }
        .image { width: 50%; border-radius: 8px; margin: 20px 0; display: block; }
        .content-block { margin-bottom: 25px; }
        .footer { font-size: 0.85em; color: #7f8c8d; text-align: center; margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>趨勢探針 (The Probe)</h1>
        
        <div class="summary-box">
            <h3>核心洞察</h3>
            {{SUMMARY_CONTENT}}
        </div>
        
        <div class="content-block">
            <h3>本期主軸</h3>
            <img src="data:image/png;base64,{{IMAGE_COVER}}" class="image" alt="Main Trend Illustration">
            {{MAIN_THEME_CONTENT}}
        </div>

        <div class="content-block">
            <h3>戰情雷達</h3>
            {{RADAR_CONTENT}}
        </div>

        <div class="content-block">
            <h3>重點深讀</h3>
            {{DEEP_DIVE_CONTENT}}
        </div>

        <div class="footer">本郵件為產業分析自動化產出，請勿直接回覆。</div>
    </div>
</body>
</html>
